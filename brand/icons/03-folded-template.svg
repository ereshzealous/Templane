<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Templane — Folded Template
       Concept: a document with a folded corner and a checkmark. Validated template.
       Palette: forest green + cream + charcoal + ochre highlight. -->
  <rect width="256" height="256" fill="#F4EDE0"/>

  <!-- back paper (ochre) -->
  <g transform="translate(60 48) rotate(-3)">
    <path d="M 0 0 L 110 0 L 110 160 L 0 160 Z"
          fill="#D9A441" stroke="#2B2A28" stroke-width="4" stroke-linejoin="round"/>
  </g>

  <!-- front paper with folded corner -->
  <g transform="translate(78 58) rotate(3)">
    <!-- main body with top-right fold -->
    <path d="M 0 0 L 82 0 L 110 28 L 110 160 L 0 160 Z"
          fill="#FBF6EB" stroke="#2B2A28" stroke-width="4" stroke-linejoin="round"/>
    <!-- folded corner triangle (slight shadow) -->
    <path d="M 82 0 L 82 28 L 110 28 Z"
          fill="#E8DCC4" stroke="#2B2A28" stroke-width="4" stroke-linejoin="round"/>

    <!-- typed schema lines -->
    <line x1="14" y1="52" x2="64" y2="52" stroke="#2B2A28" stroke-width="3" stroke-linecap="round"/>
    <line x1="24" y1="68" x2="94" y2="68" stroke="#C75B3C" stroke-width="3" stroke-linecap="round"/>
    <line x1="24" y1="84" x2="80" y2="84" stroke="#2B2A28" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
    <line x1="14" y1="102" x2="56" y2="102" stroke="#2B2A28" stroke-width="3" stroke-linecap="round"/>
    <line x1="24" y1="118" x2="90" y2="118" stroke="#2B2A28" stroke-width="3" stroke-linecap="round" opacity="0.65"/>

    <!-- forest green check badge -->
    <circle cx="82" cy="140" r="18" fill="#4A6B52" stroke="#2B2A28" stroke-width="4"/>
    <path d="M 73 140 L 80 147 L 92 133"
          fill="none" stroke="#F4EDE0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
