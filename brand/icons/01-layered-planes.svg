<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Templane — Layered Planes
       Concept: three stacked angled rectangles, evokes "template" + "plane".
       Palette: terracotta / ochre / cream, charcoal outline. -->
  <rect width="256" height="256" fill="#F4EDE0"/>

  <!-- bottom plane (ochre) -->
  <g transform="translate(128 150) rotate(-8) translate(-70 -30)">
    <rect x="0" y="0" width="140" height="60" rx="6" fill="#D9A441" stroke="#2B2A28" stroke-width="4"/>
    <line x1="18" y1="18" x2="90" y2="18" stroke="#2B2A28" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
    <line x1="18" y1="32" x2="110" y2="32" stroke="#2B2A28" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
    <line x1="18" y1="46" x2="70" y2="46" stroke="#2B2A28" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- middle plane (terracotta) -->
  <g transform="translate(128 118) rotate(4) translate(-70 -30)">
    <rect x="0" y="0" width="140" height="60" rx="6" fill="#C75B3C" stroke="#2B2A28" stroke-width="4"/>
    <line x1="18" y1="18" x2="100" y2="18" stroke="#F4EDE0" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="18" y1="32" x2="80" y2="32" stroke="#F4EDE0" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="18" y1="46" x2="115" y2="46" stroke="#F4EDE0" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- top plane (cream with forest accent) -->
  <g transform="translate(128 86) rotate(-4) translate(-70 -30)">
    <rect x="0" y="0" width="140" height="60" rx="6" fill="#F4EDE0" stroke="#2B2A28" stroke-width="4"/>
    <!-- checkmark seal -->
    <circle cx="115" cy="30" r="14" fill="#4A6B52" stroke="#2B2A28" stroke-width="3"/>
    <path d="M 108 30 L 114 36 L 122 24" fill="none" stroke="#F4EDE0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="18" y1="22" x2="70" y2="22" stroke="#2B2A28" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
    <line x1="18" y1="38" x2="90" y2="38" stroke="#2B2A28" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  </g>
</svg>
