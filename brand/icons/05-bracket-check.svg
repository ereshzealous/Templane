<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Templane — Bracket + Check
       Concept: hand-drawn { ✓ } — typed template contract.
       Palette: charcoal on cream with rust + forest accents. -->
  <rect width="256" height="256" fill="#F4EDE0"/>

  <!-- Left brace { -->
  <path d="M 76 60
           C 60 60, 56 72, 56 92
           L 56 116
           C 56 124, 50 128, 42 128
           C 50 128, 56 132, 56 140
           L 56 164
           C 56 184, 60 196, 76 196"
        fill="none" stroke="#2B2A28" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right brace } -->
  <path d="M 180 60
           C 196 60, 200 72, 200 92
           L 200 116
           C 200 124, 206 128, 214 128
           C 206 128, 200 132, 200 140
           L 200 164
           C 200 184, 196 196, 180 196"
        fill="none" stroke="#2B2A28" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- hand-drawn check (forest) -->
  <path d="M 98 132 L 118 154 L 158 104"
        fill="none" stroke="#4A6B52" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- small ochre dot above check — signature accent -->
  <circle cx="170" cy="84" r="6" fill="#D9A441" stroke="#2B2A28" stroke-width="2.5"/>

  <!-- small terracotta underline — handwritten feel -->
  <path d="M 92 214 Q 128 206, 170 214"
        fill="none" stroke="#C75B3C" stroke-width="5" stroke-linecap="round"/>
</svg>
