<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Templane — Paper + Seal
       Concept: a document with a wax-seal stamp. Contract / conformance feel.
       Palette: cream paper, rust seal, charcoal ink. -->
  <rect width="256" height="256" fill="#F4EDE0"/>

  <!-- paper with slightly torn/hand-cut edge feel (subtle) -->
  <g transform="translate(52 40)">
    <rect x="0" y="0" width="132" height="176" rx="3" fill="#FBF6EB" stroke="#2B2A28" stroke-width="4"/>

    <!-- schema lines (typed contract) -->
    <line x1="16" y1="30" x2="80" y2="30" stroke="#2B2A28" stroke-width="3" stroke-linecap="round"/>
    <line x1="28" y1="46" x2="110" y2="46" stroke="#C75B3C" stroke-width="3" stroke-linecap="round"/>
    <line x1="28" y1="62" x2="92" y2="62" stroke="#2B2A28" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="16" y1="80" x2="60" y2="80" stroke="#2B2A28" stroke-width="3" stroke-linecap="round"/>
    <line x1="28" y1="96" x2="108" y2="96" stroke="#D9A441" stroke-width="3" stroke-linecap="round"/>
    <line x1="28" y1="112" x2="80" y2="112" stroke="#2B2A28" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- wax seal, overhanging bottom-right -->
  <g transform="translate(176 176)">
    <!-- seal body -->
    <circle cx="0" cy="0" r="34" fill="#B54B28" stroke="#2B2A28" stroke-width="4"/>
    <!-- inner ring -->
    <circle cx="0" cy="0" r="26" fill="none" stroke="#F4EDE0" stroke-width="2" opacity="0.6"/>
    <!-- T monogram -->
    <path d="M -14 -12 L 14 -12 M 0 -12 L 0 14"
          stroke="#F4EDE0" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- tiny sunburst ticks -->
    <g stroke="#F4EDE0" stroke-width="2" stroke-linecap="round" opacity="0.5">
      <line x1="0" y1="-30" x2="0" y2="-26"/>
      <line x1="21" y1="-21" x2="18" y2="-18"/>
      <line x1="30" y1="0" x2="26" y2="0"/>
      <line x1="21" y1="21" x2="18" y2="18"/>
      <line x1="0" y1="30" x2="0" y2="26"/>
      <line x1="-21" y1="21" x2="-18" y2="18"/>
      <line x1="-30" y1="0" x2="-26" y2="0"/>
      <line x1="-21" y1="-21" x2="-18" y2="-18"/>
    </g>
  </g>
</svg>
