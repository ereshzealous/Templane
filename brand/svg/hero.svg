<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <!-- Templane — hero / social card (1280×640). Dark bg + cream wordmark + emerald accent. -->
  <rect width="1280" height="640" fill="#1C1C1E"/>

  <!-- subtle corner tick -->
  <rect x="0" y="0" width="12" height="80" fill="#4ECB8C"/>

  <!-- centered lockup -->
  <g transform="translate(360 220)">
    <!-- mark at ~140x140 (scale 1.4 of the 100-unit canvas) -->
    <g transform="scale(1.4)">
      <path d="M 28 22 C 20 22, 18 30, 18 38 L 18 44 C 18 48, 15 50, 12 50 C 15 50, 18 52, 18 56 L 18 62 C 18 70, 20 78, 28 78"
            fill="none" stroke="#FAFAF7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="36" y="28" width="6" height="44" fill="#FAFAF7"/>
      <rect x="42" y="46" width="22" height="8" fill="#4ECB8C"/>
      <path d="M 72 22 C 80 22, 82 30, 82 38 L 82 44 C 82 48, 85 50, 88 50 C 85 50, 82 52, 82 56 L 82 62 C 82 70, 80 78, 72 78"
            fill="none" stroke="#FAFAF7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="170" y="110"
          font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-size="118"
          font-weight="500"
          letter-spacing="-4"
          fill="#FAFAF7">templane</text>
  </g>

  <!-- tagline -->
  <text x="640" y="480"
        font-family="'SF Mono', Menlo, monospace"
        font-size="22"
        letter-spacing="2"
        text-anchor="middle"
        fill="rgba(250,250,247,0.55)">a protocol for typed template contracts</text>

  <!-- proof line -->
  <text x="640" y="540"
        font-family="'SF Mono', Menlo, monospace"
        font-size="16"
        letter-spacing="1"
        text-anchor="middle"
        fill="#4ECB8C">5 × 32/32 conformant · python · typescript · java · go · ref</text>
</svg>
