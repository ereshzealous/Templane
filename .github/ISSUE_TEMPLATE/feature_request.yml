name: ✨ Feature request
description: Propose a new feature, spec change, or ergonomic improvement.
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. If you're not sure whether something belongs
        as a feature request vs. a design discussion, feel free to open a
        [Discussion](https://github.com/ereshzealous/Templane/discussions)
        first.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Where would this change live?
      options:
        - Protocol (SPEC.md change — affects all implementations)
        - One implementation (a binding or language impl)
        - CLI (xt or templane-conform)
        - Docs / examples
        - Tooling (CI, release, brand)
        - Not sure
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What are you trying to accomplish? What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: |
        Your suggested design. Rough sketches and half-formed ideas are
        welcome — the goal is to start the conversation, not ship a PR.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you preferred this one.

  - type: checkboxes
    id: compatibility
    attributes:
      label: Compatibility
      description: Would this be backward-compatible with existing schemas / data / bindings?
      options:
        - label: Backward-compatible (additive, no existing schema or data breaks)
        - label: Breaking change (requires a SPEC major bump and coordinated impl updates)
        - label: Not sure
