name: 🐛 Bug report
description: Report a bug in a Templane implementation, the CLI, or the spec.
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in as much as you can — the more
        specific, the faster we can reproduce and fix.

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      description: Which part of Templane is affected?
      options:
        - templane-ts (TypeScript + Handlebars)
        - templane-python (Python + Jinja2)
        - templane-java (Java + FreeMarker)
        - templane-go (Go)
        - templane-spec / templane-core (Python reference)
        - templane-conform (CLI)
        - xt CLI
        - SPEC.md (protocol)
        - Docs
        - Other / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Package version or commit SHA.
      placeholder: "e.g. templane-ts 0.1.0, or commit abc1234"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: |
        Shortest set of steps / code / schema + data that triggers the bug.
        If possible, include the schema, the data, and the render/check
        invocation.
      render: text
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, language runtime version, package versions.
      placeholder: |
        - OS: macOS 14 / Ubuntu 24.04 / ...
        - Runtime: Node 20.x / Python 3.12 / Java 21 / Go 1.22
        - Templane version: 0.1.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Any relevant stack trace, error message, or CLI output.
      render: text
