name: Release templane-java (manual)

# Builds all 4 publishable Java modules (templane-core, templane-adapter-html,
# templane-adapter-yaml, freemarker-templane) plus the conform-adapter fat JAR.
#
# Publishing strategy (two options, controlled by inputs):
#   1. "artifacts-only" — build JARs, attach to GitHub release, no registry publish
#      (safe default; suitable for v0.1.0 and when Maven Central isn't set up).
#   2. "maven-central" — publish to Maven Central via the Central Portal
#      (requires: MAVEN_CENTRAL_USERNAME, MAVEN_CENTRAL_PASSWORD, SIGNING_KEY,
#      SIGNING_PASSWORD).
#      Also requires that the namespace for `io.github.ereshzealous` is verified in
#      Sonatype Central.
#
# Manual trigger only.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0 — no "v" prefix)'
        required: true
        type: string
      publish_target:
        description: 'Where to publish'
        required: true
        default: 'artifacts-only'
        type: choice
        options:
          - artifacts-only
          - maven-central

jobs:
  release:
    name: Build + publish templane-java
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Bump version
        working-directory: templane-java
        run: |
          sed -i 's|^version=.*|version=${{ inputs.version }}|' gradle.properties
          cat gradle.properties

      - name: Run tests
        working-directory: templane-java
        run: ./gradlew test

      - name: Build all JARs (including fat conform-adapter)
        working-directory: templane-java
        run: |
          ./gradlew build :conform-adapter:shadowJar
          # Copy all publishable JARs to a staging dir
          mkdir -p ../dist-java
          find . -path '*/build/libs/*.jar' -not -name '*-plain.jar' -exec cp {} ../dist-java/ \;
          ls -la ../dist-java/

      - name: Create git tag + GitHub release with JARs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "templane-java/v${{ inputs.version }}"
          git push origin "templane-java/v${{ inputs.version }}"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: templane-java/v${{ inputs.version }}
          name: templane-java ${{ inputs.version }}
          generate_release_notes: true
          files: dist-java/*.jar

      # ---------------------------------------------------------------
      # Option 2: Maven Central via Central Portal
      # ---------------------------------------------------------------
      - name: Publish to Maven Central
        if: ${{ inputs.publish_target == 'maven-central' }}
        working-directory: templane-java
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          MAVEN_CENTRAL_AUTOMATIC_RELEASE: "true"
        run: |
          ./gradlew publishAggregationToCentralPortal
