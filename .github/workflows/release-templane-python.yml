name: Release templane-python (manual)

# Publishes templane-python to PyPI via Trusted Publishing (OIDC, no tokens needed)
# OR falls back to API token if PYPI_TOKEN secret is set.
#
# Trusted Publishing setup (preferred):
#   1. Go to https://pypi.org/manage/account/publishing/ (after first manual upload
#      OR via "pending publisher" for a fresh project).
#   2. Add publisher: GitHub org, this repo, this workflow file, environment = `pypi`.
#   3. No secrets needed — OIDC handles auth.
#
# Alternative (API token):
#   1. Create PyPI API token scoped to `templane-python`.
#   2. Add as repository secret PYPI_TOKEN.
#   3. This workflow will use it if the id-token path fails.
#
# Manual trigger only.

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Semver bump from the latest templane-python/v* tag'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]
      publish_to_pypi:
        description: 'Actually publish to PyPI? (uncheck for dry-run)'
        required: true
        default: true
        type: boolean

jobs:
  release:
    name: Build + publish templane-python
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/templane-python/
    permissions:
      contents: write
      id-token: write   # for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next version
        id: bump
        run: |
          set -euo pipefail
          PREFIX="templane-python"
          LATEST=$(git tag --list "${PREFIX}/v*" --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            MAJOR=0; MINOR=0; PATCH=0
          else
            VERSION="${LATEST#${PREFIX}/v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          fi
          case "${{ inputs.bump_type }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "latest tag: ${LATEST:-<none>} → new version: $NEW"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install deps
        working-directory: templane-python
        run: uv sync --extra dev

      - name: Run tests
        working-directory: templane-python
        run: .venv/bin/pytest

      - name: Bump version in pyproject.toml
        working-directory: templane-python
        run: |
          python - <<EOF
          import re, pathlib
          p = pathlib.Path("pyproject.toml")
          txt = p.read_text()
          txt = re.sub(r'^version\s*=\s*"[^"]*"', 'version = "${{ steps.bump.outputs.version }}"', txt, count=1, flags=re.M)
          p.write_text(txt)
          EOF
          head -10 pyproject.toml

      - name: Build sdist + wheel
        working-directory: templane-python
        run: uv build

      - name: Validate distributions (twine check)
        working-directory: templane-python
        run: uvx twine check --strict dist/*

      - name: Create git tag + GitHub release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "templane-python/v${{ steps.bump.outputs.version }}"
          git push origin "templane-python/v${{ steps.bump.outputs.version }}"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: templane-python/v${{ steps.bump.outputs.version }}
          name: templane-python ${{ steps.bump.outputs.version }}
          generate_release_notes: true
          files: |
            templane-python/dist/*.tar.gz
            templane-python/dist/*.whl

      - name: Publish to PyPI (trusted publishing)
        if: ${{ inputs.publish_to_pypi }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: templane-python/dist/
          # If PYPI_TOKEN is set, use token auth instead of OIDC:
          password: ${{ secrets.PYPI_TOKEN }}
