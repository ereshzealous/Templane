name: Release templane-ts (manual)

# Manual trigger ONLY. This workflow:
#   1. Runs tests
#   2. Sets the version in package.json
#   3. Creates a git tag "templane-ts/v<version>"
#   4. Creates a GitHub release with the build artifacts attached
#   5. Publishes to npm (requires NPM_TOKEN secret)
#
# Required secret:
#   NPM_TOKEN — npm automation token with publish rights on `templane-ts`.
#
# Does NOT run on push, tag, or schedule. Always manual.

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Semver bump from the latest templane-ts/v* tag'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]
      dist_tag:
        description: 'npm dist-tag'
        required: true
        default: 'latest'
        type: choice
        options: [latest, beta, next, alpha]
      publish_to_npm:
        description: 'Actually publish to npm registry? (uncheck for dry run)'
        required: true
        default: true
        type: boolean

jobs:
  release:
    name: Build + publish templane-ts
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/templane-ts
    permissions:
      contents: write   # to create tag + release
      id-token: write   # for npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: bump
        run: |
          set -euo pipefail
          PREFIX="templane-ts"
          LATEST=$(git tag --list "${PREFIX}/v*" --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            MAJOR=0; MINOR=0; PATCH=0
          else
            VERSION="${LATEST#${PREFIX}/v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          fi
          case "${{ inputs.bump_type }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "latest tag: ${LATEST:-<none>} → new version: $NEW"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: templane-ts/package-lock.json

      - name: Install + build
        working-directory: templane-ts
        run: |
          npm ci
          npm run build

      - name: Run tests
        working-directory: templane-ts
        run: npm test

      - name: Set version
        working-directory: templane-ts
        run: npm version ${{ steps.bump.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Pack (tarball as release asset)
        working-directory: templane-ts
        run: npm pack

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "templane-ts/v${{ steps.bump.outputs.version }}"
          git push origin "templane-ts/v${{ steps.bump.outputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: templane-ts/v${{ steps.bump.outputs.version }}
          name: templane-ts ${{ steps.bump.outputs.version }}
          generate_release_notes: true
          files: templane-ts/templane-ts-${{ steps.bump.outputs.version }}.tgz

      - name: Publish to npm
        if: ${{ inputs.publish_to_npm }}
        working-directory: templane-ts
        run: npm publish --access public --tag ${{ inputs.dist_tag }} --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
