name: Release templane-conform CLI (manual)

# The conformance test runner is the Node.js CLI in templane-spec/templane-conform.
# This workflow publishes it as `templane-conform` on npm so anyone can run
# `npx templane-conform ...` to validate their TSP implementation.
#
# Required secret:
#   NPM_TOKEN — automation token with publish rights on `templane-conform`.
#
# Manual trigger only.

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Semver bump from the latest templane-conform/v* tag'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]
      dist_tag:
        description: 'npm dist-tag'
        required: true
        default: 'latest'
        type: choice
        options: [latest, beta, next]
      publish_to_npm:
        description: 'Actually publish to npm?'
        required: true
        default: true
        type: boolean

jobs:
  release:
    name: Build + publish templane-conform
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/templane-conform
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next version
        id: bump
        run: |
          set -euo pipefail
          PREFIX="templane-conform"
          LATEST=$(git tag --list "${PREFIX}/v*" --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            MAJOR=0; MINOR=0; PATCH=0
          else
            VERSION="${LATEST#${PREFIX}/v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          fi
          case "${{ inputs.bump_type }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "latest tag: ${LATEST:-<none>} → new version: $NEW"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: templane-spec/templane-conform/package-lock.json

      - name: Install + build
        working-directory: templane-spec/templane-conform
        run: |
          npm ci
          npm run build

      - name: Set version
        working-directory: templane-spec/templane-conform
        run: npm version ${{ steps.bump.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Pack tarball
        working-directory: templane-spec/templane-conform
        run: npm pack

      - name: Create tag + release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "templane-conform/v${{ steps.bump.outputs.version }}"
          git push origin "templane-conform/v${{ steps.bump.outputs.version }}"

      - name: GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: templane-conform/v${{ steps.bump.outputs.version }}
          name: templane-conform ${{ steps.bump.outputs.version }}
          generate_release_notes: true
          files: templane-spec/templane-conform/templane-conform-${{ steps.bump.outputs.version }}.tgz

      - name: Publish to npm
        if: ${{ inputs.publish_to_npm }}
        working-directory: templane-spec/templane-conform
        run: npm publish --access public --tag ${{ inputs.dist_tag }} --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
