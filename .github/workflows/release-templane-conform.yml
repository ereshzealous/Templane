name: Release templane-conform CLI (manual)

# The conformance test runner is the Node.js CLI in templane-spec/templane-conform.
# This workflow publishes it as `templane-conform` on npm so anyone can run
# `npx templane-conform ...` to validate their TSP implementation.
#
# Required secret:
#   NPM_TOKEN — automation token with publish rights on `templane-conform`.
#
# Manual trigger only.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0)'
        required: true
        type: string
      dist_tag:
        description: 'npm dist-tag'
        required: true
        default: 'latest'
        type: choice
        options: [latest, beta, next]
      publish_to_npm:
        description: 'Actually publish to npm?'
        required: true
        default: true
        type: boolean

jobs:
  release:
    name: Build + publish templane-conform
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/templane-conform
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: templane-spec/templane-conform/package-lock.json

      - name: Install + build
        working-directory: templane-spec/templane-conform
        run: |
          npm ci
          npm run build

      - name: Set version
        working-directory: templane-spec/templane-conform
        run: npm version ${{ inputs.version }} --no-git-tag-version --allow-same-version

      - name: Pack tarball
        working-directory: templane-spec/templane-conform
        run: npm pack

      - name: Create tag + release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "templane-conform/v${{ inputs.version }}"
          git push origin "templane-conform/v${{ inputs.version }}"

      - name: GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: templane-conform/v${{ inputs.version }}
          name: templane-conform ${{ inputs.version }}
          generate_release_notes: true
          files: templane-spec/templane-conform/templane-conform-${{ inputs.version }}.tgz

      - name: Publish to npm
        if: ${{ inputs.publish_to_npm }}
        working-directory: templane-spec/templane-conform
        run: npm publish --access public --tag ${{ inputs.dist_tag }} --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
