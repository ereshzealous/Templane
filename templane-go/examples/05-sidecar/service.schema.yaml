# Sidecar schema for service.tmpl.
# The .tmpl file is plain Go text/template — editable as-is. This schema
# validates the data map before template.Execute() runs.
body: ./service.tmpl
engine: gotemplate

description:
  type: string
  required: true
run_as:
  type: string
  required: true
working_dir:
  type: string
  required: true
exec_start:
  type: string
  required: true
restart_policy:
  type: enum
  values: [no, on-failure, always, on-abnormal, on-abort, on-watchdog]
  required: true
env:
  type: list
  required: false
  items:
    type: object
    fields:
      name:
        type: string
        required: true
      value:
        type: string
        required: true
