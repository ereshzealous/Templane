# Sidecar schema for the chart's deployment template + every values-*.yaml
# file that feeds into it. The template body is an untouched Go template
# (deployment.yaml.tmpl) — Templane doesn't rewrite your chart, it
# validates the data before Helm/kubectl ever see it.
body: ./deployment.yaml.tmpl
engine: gotemplate

replicaCount:
  type: number
  required: true
image:
  type: object
  required: true
  fields:
    repository:
      type: string
      required: true
    tag:
      type: string
      required: true
    pullPolicy:
      type: enum
      values: [Always, IfNotPresent, Never]
      required: true
service:
  type: object
  required: true
  fields:
    type:
      type: enum
      values: [ClusterIP, NodePort, LoadBalancer]
      required: true
    port:
      type: number
      required: true
    targetPort:
      type: number
      required: false
ingress:
  type: object
  required: false
  fields:
    enabled:
      type: boolean
      required: true
    host:
      type: string
      required: true
    tls:
      type: boolean
      required: false
resources:
  type: object
  required: true
  fields:
    requests:
      type: object
      required: true
      fields:
        cpu:
          type: string
          required: true
        memory:
          type: string
          required: true
    limits:
      type: object
      required: true
      fields:
        cpu:
          type: string
          required: true
        memory:
          type: string
          required: true
env:
  type: list
  items:
    type: object
    fields:
      name:
        type: string
        required: true
      value:
        type: string
        required: true
  required: false
nodeSelector:
  type: object
  required: false
  fields:
    kubernetes.io/os:
      type: enum
      values: [linux, windows]
      required: false
